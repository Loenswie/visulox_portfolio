services:
  - type: web
    name: visulox-portfolio
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    routes:
      # SPA fallback — vue-router uses createWebHistory, so a direct/refreshed
      # load of e.g. /work/noctua or /about needs to resolve to index.html
      # and let the client-side router take over, same as the rewrite rules
      # already set up in vercel.json / netlify.toml.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
