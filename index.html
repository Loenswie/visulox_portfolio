<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/logo_white_favicon.png" />

    <title>VISULOX</title>
    <meta name="description" content="VISULOX is the creative identity of Louis Lefebure, a graphic designer working across branding, campaigns and digital experiences, with software engineering to bring it all to life. The art of creating your vision." />
    <meta name="author" content="Louis Lefebure" />
    <meta name="theme-color" content="#050505" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VISULOX" />
    <meta property="og:title" content="VISULOX" />
    <meta property="og:description" content="VISULOX is the creative identity of Louis Lefebure, a graphic designer working across branding, campaigns and digital experiences, with software engineering to bring it all to life. The art of creating your vision." />
    <meta property="og:image" content="/Profielfoto_Grungy.jpg" />
    <meta property="og:url" content="https://visulox.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VISULOX | Louis Lefebure" />
    <meta name="twitter:description" content="VISULOX is the creative identity of Louis Lefebure, a graphic designer working across branding, campaigns and digital experiences, with software engineering to bring it all to life. The art of creating your vision." />
    <meta name="twitter:image" content="/Profielfoto_Grungy.jpg" />

    <!-- Preload the hero background photo — it's the largest visible element
         on first paint (LCP candidate on the homepage), so starting the
         fetch as early as possible matters more here than for any other
         image on the site. -->
    <link rel="preload" as="image" href="/BACKGROUND_TITLE.jpg" />

    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@400;600;700&display=swap" />

    <meta name="color-scheme" content="dark" />
  </head>
  <body>
    <noscript>VISULOX runs on JavaScript, please enable it to experience the full site.</noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
